name: Bug Report
description: Create a report to help us improve PolyRunner
title: "[BUG] "
labels: ["bug"]
assignees: []
body:
  - type: markdown
    attributes:
      value: "Thanks for taking the time to report this! Please provide as much details as possible."
  - type: input
    id: system_info
    attributes:
      label: System Information
      description: What OS are you using? (Windows 11, Ubuntu 22.04, macOS Sonoma...)
      placeholder: Windows 11
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: PolyRunner Version
      description: What version of PolyRunner are you running? (Run `polyrunner --version` if available, or list the release downloaded)
      placeholder: v0.1.2
    validations:
      required: true
  - type: textarea
    id: bug_description
    attributes:
      label: Describe the bug
      description: A clear and concise description of what the bug is.
      placeholder: When I try to do X, Y happens instead of Z...
    validations:
      required: true
  - type: textarea
    id: reproduction_steps
    attributes:
      label: Steps to reproduce
      description: How can we trigger this bug?
      value: |
        1. Open PolyRunner in directory '...'
        2. Press '...'
        3. See error
    validations:
      required: true
